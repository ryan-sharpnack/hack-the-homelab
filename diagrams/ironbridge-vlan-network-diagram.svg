<svg viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <title>Ironbridge Health Alliance network diagram</title>
  <desc>FW01 pfSense routes three VLANs: Corporate with DC01-Ironbridge and SIEM01, Hospital with WS01 and APP01, and Hawthorne with the legacy DC01-Hawthorne. A dashed amber line shows the one-way AD trust from Hawthorne into Corporate, marking it as the acquired-site risk path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#B45309" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="237" y="40" width="200" height="70" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="257" y="64" font-size="14" font-weight="600" fill="#1F2937">FW01 (pfSense)</text>
  <text x="257" y="80" font-size="12" fill="#4B5563">Inter-VLAN routing</text>

  <line x1="337" y1="110" x2="132" y2="180" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="337" y1="110" x2="337" y2="180" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="337" y1="110" x2="542" y2="180" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="180" width="185" height="110" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="60" y="204" font-size="14" font-weight="600" fill="#1F2937">VLAN 10 - Corp</text>
  <text x="60" y="224" font-size="12" fill="#4B5563">10.50.10.0/24</text>
  <text x="60" y="244" font-size="12" fill="#4B5563">DC01, SIEM01</text>

  <rect x="245" y="180" width="185" height="110" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="265" y="204" font-size="14" font-weight="600" fill="#1F2937">VLAN 20 - Hosp</text>
  <text x="265" y="224" font-size="12" fill="#4B5563">10.50.20.0/24</text>
  <text x="265" y="244" font-size="12" fill="#4B5563">WS01, APP01</text>

  <rect x="450" y="180" width="185" height="110" rx="12" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="470" y="204" font-size="14" font-weight="600" fill="#92400E">VLAN 30 - Hawth</text>
  <text x="470" y="224" font-size="12" fill="#92400E">10.50.30.0/24</text>
  <text x="470" y="244" font-size="12" fill="#92400E">DC01-Hawthorne</text>

  <path d="M542,290 L542,320 L132,320 L132,290" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-amber)"/>
  <text x="337" y="345" font-size="12" fill="#4B5563" text-anchor="middle">1-way AD trust</text>

  <rect x="260" y="372" width="16" height="16" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="284" y="384" font-size="12" fill="#4B5563">amber = legacy/acquired risk (Hawthorne)</text>
</svg>
