<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Ironbridge Health Alliance social preview</title>
  <desc>A white background social preview card featuring the Ironbridge Health Alliance interlocking-rings logo and wordmark, centered with wide margins to survive cropping, with a tagline beneath.</desc>
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <g transform="translate(261,62) scale(1.6)">
    <g transform="translate(10,10) scale(0.7)">
      <circle cx="95" cy="95" r="50" fill="none" stroke="#14495A" stroke-width="16"/>
      <circle cx="125" cy="125" r="38" fill="none" stroke="#1E8A7A" stroke-width="16"/>
    </g>
    <text x="165" y="82" font-size="36" font-weight="700" fill="#14495A" letter-spacing="0.5">IRONBRIDGE</text>
    <text x="165" y="106" font-size="15" font-weight="600" fill="#1E8A7A" letter-spacing="3">HEALTH ALLIANCE</text>
  </g>
  <text x="600" y="440" font-size="26" fill="#4B5563" text-anchor="middle">Designing, defending, and documenting a healthcare enterprise.</text>
  <text x="600" y="580" font-size="16" fill="#9CA3AF" text-anchor="middle" letter-spacing="1">#HackTheHomelab</text>
</svg>
